<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>First thymeleaf page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-body">
            <h1 class="text-center mb-4">Employee List</h1>
            <table class="table table-striped table-bordered table-hover">
                <thead class="table-dark">
                <tr>
                    <th>Id</th>
                    <th>Username</th>
                    <th>Fullname</th>
                    <th>Role</th>
                    <th>Join date</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="employee : ${getAllEmployees}">
                    <td th:text="${employee.id}"></td>
                    <td th:text="${employee.username}"></td>
                    <td th:text="${employee.fullName}"></td>
                    <td th:text="${employee.role.getRole()}"></td>
                    <td th:text="${employee.createdAt}"></td>
                </tr>
                </tbody>
            </table>
            <h2>Employee count</h2>
            <hr>
            <div>
                <p>Admins: <span th:text="${getAdminCount}"></span></p>
                <p>Stock managers: <span th:text="${getStockManagerCount}"></span></p>
                <p>Cashiers: <span th:text="${getCashierCount}"></span></p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
