<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${employee.id != null} ? 'Edit Employee' : 'Add Employee'">Add Employee</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #f5f3ff;
            margin: 0;
        }

        h1 {
            color: #00026d;
            text-align: center;
            margin: 20px 0;
        }

        form {
            max-width: 500px;
            margin: 30px auto;
            padding: 30px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        form div {
            margin-bottom: 15px;
        }

        label {
            font-weight: 600;
            color: #554e68;
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #9f7cff;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #00026d;
            box-shadow: 0 0 5px rgba(159, 124, 255, 0.5);
        }

        #message {
            font-weight: 600;
            margin-top: -10px;
            margin-bottom: 10px;
        }

        button[type="submit"] {
            background: #9f7cff;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        button[type="submit"]:hover {
            background: #9a91b3;
            color: #00026d;
        }

        button[type="reset"] {
            background: #ede9fe;
            color: #554e68;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        button[type="reset"]:hover {
            background: #e1dfe6;
            color: #00026d;
        }

        /* Responsive */
        @media (max-width: 576px) {
            form {
                padding: 20px;
                margin: 20px 15px;
            }
        }
    </style>
</head>

<body>

<h1 th:text="${employee.id != null} ? 'Edit Employee' : 'Add Employee'">Add Employee</h1>

<form th:action="${employee.id != null} ? @{/admin/editEmployee/{id}(id=${employee.id})} : @{/admin/addEmployee}" 
      th:object="${employee}" method="post">

    <input type="hidden" th:field="*{id}">

    <div>
        <label>Full Name</label>
        <input type="text" th:field="*{fullName}" placeholder="Full Name" autocomplete="off" required>
    </div>

    <div>
        <label>Email</label>
        <input type="email" th:field="*{email}" placeholder="Email" autocomplete="off" required>
    </div>

    <div>
        <label>Username</label>
        <input type="text" th:field="*{username}" placeholder="Username" autocomplete="off" required>
    </div>

    <div>
        <label>Password</label>
        <input type="password" th:field="*{password}" id="password" placeholder="Password" autocomplete="new-password">
    </div>

    <div>
        <label>Confirm Password</label>
        <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Confirm Password" autocomplete="new-password">
    </div>
    <p id="message"></p>

    <div>
        <label>Role</label>
        <select th:field="*{role}" required>
            <option value="">Select role</option>
            <option value="ADMIN">Admin</option>
            <option value="STOCK_MANAGER">Stock Manager</option>
            <option value="CASHIER">Cashier</option>
        </select>
    </div>

    <div class="d-flex justify-content-between mt-4">
        <button type="submit" th:text="${employee.id != null} ? 'Update Employee' : 'Add Employee'">Add Employee</button>
        <button type="reset">Reset</button>
    </div>
</form>

<script>
const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirmPassword");
const message = document.getElementById("message");

function checkPasswords() {
    if (confirmPassword.value === "") {
        message.textContent = "";
        return;
    }
    if (password.value === confirmPassword.value) {
        message.textContent = "Passwords match";
        message.style.color = "green";
    } else {
        message.textContent = "Passwords do not match!";
        message.style.color = "red";
    }
}

password.addEventListener("input", checkPasswords);
confirmPassword.addEventListener("input", checkPasswords);
</script>

</body>
</html>
