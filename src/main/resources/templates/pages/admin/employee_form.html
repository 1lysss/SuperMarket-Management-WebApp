<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Employee</title>
    <link rel="stylesheet" href="/css/employee_form.css">
</head>
<body>
<div class="container">
    <form th:action="${employee.id != null} ? @{/admin/editEmployee/{id}(id=${employee.id})} : @{/admin/addEmployee}"
          th:object="${employee}" method="post">
        <h1 th:text="${employee.id != null} ? 'Edit Employee' : 'Add Employee'"></h1>
        <input type="hidden" th:field="*{id}">
        <div>
            <label>Full Name</label>
            <input type="text"
                   th:field="*{fullName}"
                   placeholder="Full Name"
                   autocomplete="off"
                   required>
        </div>
        <div>
            <label>Email</label>
            <input type="email"
                   th:field="*{email}"
                   placeholder="Email"
                   autocomplete="off"
                   required>
        </div>
        <div>
            <label>Username</label>
            <input type="text"
                   th:field="*{username}"
                   placeholder="Username"
                   autocomplete="off"
                   required>
        </div>
        <div>
            <label>Password</label>
            <input type="password"
                   th:field="*{password}"
                   id="password"
                   placeholder="Password"
                   autocomplete="new-password">
        </div>
        <div>
            <label>Confirm Password</label>
            <input type="password"
                   name="confirmPassword"
                   id="confirmPassword"
                   placeholder="Confirm Password"
                   autocomplete="new-password">
        </div>
        <p id="message"></p>
        <div>
            <label>Role</label>
            <select th:field="*{role}" required>
                <option value="">Select role</option>
                <option value="ADMIN">Admin</option>
                <option value="STOCK_MANAGER">Stock Manager</option>
                <option value="CASHIER">Cashier</option>
            </select>
        </div>
        <br>
        <button type="submit" th:text="${employee.id != null} ? 'Update Employee' : 'Add Employee'">Add</button>
        <button type="reset">Reset</button>
    </form>
</div>
<script>
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");
    const message = document.getElementById("message");
    function checkPasswords() {
        if (confirmPassword.value === "") {
            message.textContent = "";
            return;
        }
        if (password.value === confirmPassword.value) {
            message.textContent = "Passwords match";
            message.style.color = "green";
        } else {
            message.textContent = "Passwords do not match!";
            message.style.color = "red";
        }
    }
    password.addEventListener("input", checkPasswords);
    confirmPassword.addEventListener("input", checkPasswords);
</script>
</body>
</html>
