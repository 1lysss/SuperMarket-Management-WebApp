<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Supermarket</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link rel="stylesheet" href="style.css">
<style>

/* Main Content */
.main-content { margin-left:0; padding:20px; transition:0.3s; }

/* Cards */
.cards { display:flex; gap:20px; flex-wrap:wrap; margin-bottom:20px; }
.card { flex:1; min-width:180px; background:#ede9fe; padding:20px; border-radius:12px; display:flex; justify-content:space-between; align-items:center; color:#00026d; }
.card i { font-size:2rem; color:#9f7cff; }
.card .number { font-size:1.5rem; font-weight:bold; }

/* Charts */
.line-chart-container { flex:1; min-width:300px; background:#fff; padding:20px; border-radius:12px; margin-bottom:20px; }
.line-chart { position:relative; width:100%; height:200px; border-left:2px solid #00026d; border-bottom:2px solid #00026d; }

.pie-chart-container { flex:1; min-width:300px; background:#fff; padding:20px; border-radius:12px; margin-bottom:20px; display:flex; flex-direction:column; align-items:center; }
.pie-chart { width:150px; height:150px; border-radius:50%; display:flex; justify-content:center; align-items:center; color:#fff; font-weight:bold; font-size:1rem; text-align:center; margin-bottom:15px; background:conic-gradient(#22c55e 0% 33%, #ff9113 33% 66%, #ff2828 66% 100%); }
.product-status-list { display:flex; flex-direction:column; gap:6px; width:100%; }
.product-status-item { display:flex; align-items:center; gap:6px; font-weight:bold; font-size:0.95rem; }
.product-status-square { width:12px; height:12px; border-radius:2px; }
.in-stock-square { background:#22c55e; }
.low-stock-square { background:#ff9113; }
.out-stock-square { background:#ff2828; }
.total-products { font-weight:bold; font-size:1rem; margin-top:8px; text-align:left; }
</style> 
</head>
<body>

<!-- Hamburger + Overlay -->
<div class="hamburger" onclick="toggleSidebar()">&#9776;</div>
<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<div id="mySidebar" class="sidebar">
<h2>Supermarket</h2>
<a href="dashboard.html" class="active"><i class="fas fa-th-large"></i> Dashboard</a>
<a href="employee_list.html"><i class="fas fa-user-friends"></i> Employees</a>
<a href="sections.html"><i class="fas fa-th"></i> Sections</a>
<a href="products.html"><i class="fas fa-cube"></i> Products</a>
<a href="sales.html"><i class="fas fa-shopping-cart"></i> Sales</a>
<a href="stock_requests.html"><i class="fas fa-file-alt"></i> Stock Requests</a>
<a href="logs.html"><i class="fas fa-wave-square"></i> Logs</a>
<a href="admin_user.html"><i class="fas fa-user-cog"></i> Admin User</a>
<a href="logout.html"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<!-- Top bar -->
<div class="top-bar">
<div class="search-box">
<i class="fas fa-search"></i>
<input type="text" placeholder="Search..." id="dashboardSearch">
</div>
<button class="notification-btn" id="notifButton">
<i class="fas fa-bell"></i>
<span class="badge" id="notifCount">0</span>
</button>
</div>

<div id="notifDropdown"><ul id="notifList"></ul></div>

<!-- Main Content -->
<div class="main-content">
<div class="cards">
<div class="card"><div>Total Employees</div><i class="fas fa-user-friends"></i><div class="number" id="totalEmployees"></div></div>
<div class="card"><div>Total Products</div><i class="fas fa-cube"></i><div class="number" id="totalProducts"></div></div>
<div class="card"><div>Sales Today</div><i class="fas fa-shopping-cart"></i><div class="number" id="salesToday"></div></div>
<div class="card"><div>Pending Stock Requests</div><i class="fas fa-file-alt"></i><div class="number" id="pendingStock"></div></div>
</div>

<div class="charts">
<div class="line-chart-container">
<h5>Sales This Week</h5>
<div class="line-chart" id="lineChart"></div>
</div>
<div class="pie-chart-container">
<div class="pie-chart" id="pieChart"></div>
<div class="product-status-list">
<div class="product-status-item"><div class="product-status-square in-stock-square"></div>In Stock: <span id="inStock"></span></div>
<div class="product-status-item"><div class="product-status-square low-stock-square"></div>Low Stock: <span id="lowStock"></span></div>
<div class="product-status-item"><div class="product-status-square out-stock-square"></div>Out of Stock: <span id="outStock"></span></div>
<div class="total-products">Total: <span id="totalProductsPie"></span></div>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Sidebar toggle
function toggleSidebar() {
    const sidebar = document.getElementById("mySidebar");
    const overlay = document.getElementById("overlay");
    sidebar.classList.toggle("open");
    overlay.classList.toggle("show");
}

// Highlight active link
const sidebarLinks = document.querySelectorAll(".sidebar a");
const currentPage = window.location.pathname.split("/").pop();
sidebarLinks.forEach(link => {
    if(link.getAttribute("href").split("/").pop() === currentPage){
        sidebarLinks.forEach(l=>l.classList.remove("active"));
        link.classList.add("active");
    }
});

// Notification Dropdown
const notifButton = document.getElementById("notifButton");
const notifDropdown = document.getElementById("notifDropdown");
const notifList = document.getElementById("notifList");
notifButton.addEventListener("click", ()=>{
    notifDropdown.style.display = notifDropdown.style.display === "block" ? "none" : "block";
});

// Function to update dashboard with real data
function updateDashboard(data){
    document.getElementById("totalEmployees").innerText = data.totalEmployees;
    document.getElementById("totalProducts").innerText = data.totalProducts;
    document.getElementById("salesToday").innerText = data.salesToday;
    document.getElementById("pendingStock").innerText = data.pendingStock;
    
    document.getElementById("inStock").innerText = data.inStock;
    document.getElementById("lowStock").innerText = data.lowStock;
    document.getElementById("outStock").innerText = data.outStock;
    document.getElementById("totalProductsPie").innerText = data.totalProductsPie;

    // Charts remain empty: you can populate lineChart/pieChart using your own chart library and data
}
</script>
</body>
</html>
