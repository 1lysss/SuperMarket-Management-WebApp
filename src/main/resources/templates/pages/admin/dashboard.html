<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>
<div class="menu" onclick="toggleSidebar()">
    <div></div><div></div><div></div>
</div>
<div id="sidebar" class="sidebar">
    <h2>Supermarket</h2>
    <a th:href="@{/static}" class="active"><i class="fas fa-house"></i> Dashboard</a>
    <a th:href="@{/admin/employee_list}"><i class="fas fa-users"></i> Employees</a>
    <a th:href="@{/admin/sections}"><i class="fas fa-layer-group"></i> Sections</a>
    <a th:href="@{/admin/products}"><i class="fas fa-box"></i> Products</a>
    <a th:href="@{/admin/sales}"><i class="fas fa-chart-line"></i> Sales</a>
    <a th:href="@{/admin/stockRequests}"><i class="fas fa-truck"></i> Stock</a>
    <a th:href="@{/admin/logs}"><i class="fas fa-clipboard-list"></i> Logs</a>
    <a th:href="@{/admin/profile}"><i class="fas fa-user-cog"></i> Profile</a>
    <a th:href="@{/logout}"><i class="fas fa-right-from-bracket"></i> Logout</a>

</div>
<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>
<div class="main-content">
    <div class="center-wrapper">
        <div class="page-header">
            <h1>Dashboard</h1>
            <div class="actions">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search...">
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    function toggleSidebar(){
        document.getElementById("sidebar").classList.toggle("open");
        document.getElementById("overlay").classList.toggle("show");
    }
</script>

</body>
</html>
