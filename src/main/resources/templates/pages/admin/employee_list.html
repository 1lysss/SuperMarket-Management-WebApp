<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employees</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link rel="stylesheet" href="style.css">
<style>

/* Main Content */
.main-content { margin-left:0; padding:20px; transition:0.3s; }
.main-content h1 { text-align:center; margin-top:10px; color:#00026d; }
.btn-add-employee { background:#9f7cff; color:white; border:none; padding:12px 33px; border-radius:40px; }
.btn-add-employee:hover { background:#9a91b3; color:#00026d; }

/* Employee Table */
.employee-table { width:100%; margin-top:20px; }
.employee-table th { background:#9f7cff; color:white; padding:12px; }
.employee-table td { padding:10px; vertical-align:middle; }

/* Role Badges */
.role-badge { padding:5px 12px; border-radius:30px; font-size:0.75rem; font-weight:600; display:inline-block !important; }
.role-manager { background:#ff2828 !important; color:#fff !important; }
.role-cashier { background:#3b82f6 !important; color:#fff !important; }
.role-stock { background:#22c55e !important; color:#fff !important; }
.role-sales { background:#ff9113 !important; color:#fff !important; }
.role-badge:hover { transform: scale(1.05); bo
    
/* Action buttons */
.action-btn { width:32px; height:32px; display:inline-flex; justify-content:center; align-items:center; border-radius:8px; background:#ede9fe; color:#757575; text-decoration:none; margin-right:4px; }
.action-btn:hover { background:#e1dfe6; color:#00026d; }

/* Modal inputs */
#employeeForm input, #employeeForm select { width:100%; padding:8px; border-radius:6px; border:1px solid #00026d; margin-bottom:12px; }
</style>
</head>
<body>

<!-- Hamburger + Overlay -->
<div class="hamburger">&#9776;</div>
<div id="overlay" class="overlay"></div>

<!-- Sidebar -->
<div id="mySidebar" class="sidebar">
<h2>Supermarket</h2>
<a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
<a href="employee_list.html" class="active"><i class="fas fa-user-friends"></i> Employees</a>
<a href="sections.html"><i class="fas fa-th"></i> Sections</a>
<a href="products.html"><i class="fas fa-cube"></i> Products</a>
<a href="sales.html"><i class="fas fa-shopping-cart"></i> Sales</a>
<a href="stock_requests.html"><i class="fas fa-file-alt"></i> Stock Requests</a>
<a href="logs.html"><i class="fas fa-wave-square"></i> Logs</a>
<a href="admin_user.html"><i class="fas fa-user-cog"></i> Admin User</a>
<a href="logout.html"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<!-- Top Bar -->
<div class="top-bar">
<div class="search-box">
<i class="fas fa-search"></i>
<input type="text" placeholder="Search employees..." id="employeeSearch">
</div>
<button class="notification-btn" id="notifButton">
<i class="fas fa-bell"></i>
<span class="badge" id="notifCount">0</span>
</button>
</div>
<div id="notifDropdown"><ul id="notifList"></ul></div>

<!-- Main Content -->
<div class="main-content">
<h1>Employee Management</h1>
<div style="text-align: right; margin-bottom: 15px;">
<button class="btn btn-add-employee" onclick="openAddModal()">+ Add Employee</button>
</div>

<table class="table employee-table" id="employeesTable">
<thead>
<tr>
<th>ID</th><th>Full Name</th><th>Username</th><th>Role</th><th>Email</th><th>Join Date</th><th>Actions</th>
</tr>
</thead>
<tbody id="employeesTableBody"></tbody>
</table>
</div>

<!-- Modal -->
<div class="modal fade" id="employeeModal" tabindex="-1">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content p-3">
<h5 id="modalTitle">Add New Employee</h5>
<form id="employeeForm">
<input type="hidden" id="editEmployeeId" value="">
<input type="text" id="fullNameInput" placeholder="Full Name" required>
<input type="text" id="usernameInput" placeholder="Username" required>
<input type="email" id="emailInput" placeholder="Email" required>
<select id="roleInput" required>
<option value="Manager">Manager</option>
<option value="Cashier">Cashier</option>
<option value="Stock Manager">Stock Manager</option>
<option value="Sales Associate">Sales Associate</option>
</select>
<input type="date" id="joinDateInput" required>
<button type="submit" class="btn btn-add-employee">Save</button>
<button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
</form>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ===== Unified JS for Hamburger / Sidebar / Notifications =====
const sidebar = document.getElementById("mySidebar");
const overlay = document.getElementById("overlay");
const hamburger = document.querySelector(".hamburger");

function toggleSidebar() {
    sidebar.classList.toggle("open");
    overlay.classList.toggle("show");
}

hamburger.addEventListener("click", toggleSidebar);
overlay.addEventListener("click", toggleSidebar);

const sidebarLinks = document.querySelectorAll(".sidebar a");
const currentPage = window.location.pathname.split("/").pop();
sidebarLinks.forEach(link=>{
    if(link.getAttribute("href").split("/").pop()===currentPage){
        sidebarLinks.forEach(l=>l.classList.remove("active"));
        link.classList.add("active");
    }
});

// Notifications
const notifButton = document.getElementById("notifButton");
const notifDropdown = document.getElementById("notifDropdown");
const notifList = document.getElementById("notifList");
const notifBadge = document.getElementById("notifCount");
let notifications = [{message:"New employee added", page:"employee_list.html"}];
function updateBadge(){notifBadge.textContent=notifications.length;}
function renderDropdown(){
    notifList.innerHTML="";
    notifications.forEach(n=>{
        const li=document.createElement("li");
        li.textContent=n.message;
        li.onclick=()=>{window.location.href=n.page;};
        notifList.appendChild(li);
    });
}
notifButton.addEventListener("click", ()=>{
    notifDropdown.style.display = notifDropdown.style.display==="none"?"block":"none";
    renderDropdown();
});
updateBadge();

// Employee Management
let employeesDB=[];
function renderEmployeeTable(filteredList=null){
    const tbody=document.getElementById("employeesTableBody");
    tbody.innerHTML="";
    const list=filteredList||employeesDB;
    list.forEach(emp=>{
        let badgeClass="role-badge";
        if(emp.role==="Manager") badgeClass+=" role-manager";
        else if(emp.role==="Cashier") badgeClass+=" role-cashier";
        else if(emp.role==="Stock Manager") badgeClass+=" role-stock";
        else if(emp.role==="Sales Associate") badgeClass+=" role-sales";

        const row=document.createElement("tr");
        row.innerHTML=`<td>${emp.id}</td><td>${emp.fullName}</td><td>${emp.username}</td>
        <td><span class="${badgeClass}">${emp.role}</span></td><td>${emp.email}</td>
        <td>${emp.joinDate}</td>
        <td>
        <a href="#" class="action-btn btn-edit" data-id="${emp.id}"><i class="fas fa-edit"></i></a>
        <a href="#" class="action-btn btn-delete" data-id="${emp.id}"><i class="fas fa-trash-alt"></i></a>
        </td>`;
        tbody.appendChild(row);
    });

    document.querySelectorAll(".btn-edit").forEach(btn=>{
        btn.addEventListener("click", e=>{
            e.preventDefault();
            openEditModal(parseInt(btn.dataset.id));
        });
    });
    document.querySelectorAll(".btn-delete").forEach(btn=>{
        btn.addEventListener("click", e=>{
            e.preventDefault();
            if(confirm("Delete employee?")) deleteEmployee(parseInt(btn.dataset.id));
        });
    });
}

function getNextId(){return employeesDB.length===0?1:Math.max(...employeesDB.map(emp=>emp.id))+1;}
function deleteEmployee(id){employeesDB=employeesDB.filter(emp=>emp.id!==id); renderEmployeeTable();}
function saveEmployee(data, editId=null){
    if(editId){
        const i=employeesDB.findIndex(emp=>emp.id===editId);
        if(i!==-1) employeesDB[i]={...employeesDB[i], ...data, id:editId};
    } else employeesDB.push({id:getNextId(), ...data});
    renderEmployeeTable();
}

function openAddModal(){
    document.getElementById("modalTitle").innerText="Add New Employee";
    document.getElementById("employeeForm").reset();
    document.getElementById("editEmployeeId").value="";
    document.getElementById("joinDateInput").value=new Date().toISOString().split("T")[0];
    new bootstrap.Modal(document.getElementById("employeeModal")).show();
}

function openEditModal(id){
    const emp=employeesDB.find(e=>e.id===id); if(!emp)return;
    document.getElementById("modalTitle").innerText="Edit Employee";
    document.getElementById("fullNameInput").value=emp.fullName;
    document.getElementById("usernameInput").value=emp.username;
    document.getElementById("emailInput").value=emp.email;
    document.getElementById("roleInput").value=emp.role;
    document.getElementById("joinDateInput").value=emp.joinDate;
    document.getElementById("editEmployeeId").value=emp.id;
    new bootstrap.Modal(document.getElementById("employeeModal")).show();
}

document.getElementById("employeeForm").addEventListener("submit", function(e){
    e.preventDefault();
    const data={
        fullName: document.getElementById("fullNameInput").value.trim(),
        username: document.getElementById("usernameInput").value.trim(),
        email: document.getElementById("emailInput").value.trim(),
        role: document.getElementById("roleInput").value,
        joinDate: document.getElementById("joinDateInput").value
    };
    const editId=document.getElementById("editEmployeeId").value;
    if(editId) saveEmployee(data, parseInt(editId));
    else saveEmployee(data);
    bootstrap.Modal.getInstance(document.getElementById("employeeModal")).hide();
});

function closeModal(){bootstrap.Modal.getInstance(document.getElementById("employeeModal")).hide();}
renderEmployeeTable();

// Employee Search
document.getElementById("employeeSearch").addEventListener("input", function(){
    const query=this.value.toLowerCase();
    const filtered = employeesDB.filter(emp=>{
        return emp.fullName.toLowerCase().includes(query) ||
               emp.username.toLowerCase().includes(query) ||
               emp.email.toLowerCase().includes(query) ||
               emp.role.toLowerCase().includes(query);
    });
    renderEmployeeTable(filtered);
});
</script>

</body>
</html>
