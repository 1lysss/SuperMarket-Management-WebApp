<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body{
            margin:0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg,#eef2ff,#f8fafc);
        }
        .menu{
            position:fixed;
            top:15px;
            left:15px;
            width:44px;
            height:44px;
            border-radius:10px;
            background: linear-gradient(135deg, #675af3, #006fff);
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            gap:5px;
            cursor:pointer;
            z-index:1000;
            box-shadow:0 8px 20px rgba(59,130,246,0.3);
        }
        .menu div{
            width:22px;
            height:2px;
            background:white  !important;
        }
        .sidebar{
            position:fixed;
            top:0;
            left:-270px;
            width:270px;
            height:100%;
            background: linear-gradient(180deg, #484687, #181367);
            padding-top:70px;
            transition:0.35s ease;
            z-index:2000;
            box-shadow: 10px 0 30px rgba(0,0,0,0.2);
        }
        .sidebar.open{ left:0; }
        .sidebar h2{
            color: #a8afd3 !important;
            padding-left:22px;
            margin-bottom:25px;
            font-weight:800;
        }
        .sidebar a{
            display:flex;
            align-items:center;
            padding:12px 22px;
            text-decoration:none;
            border-radius:8px;
            font-size:15px;
            color:white !important;
            transition:0.2s;
        }
        .sidebar a i{
            width:35px;
            margin-right:10px;
        }

        .sidebar a:hover{
            background:#8e87f3;
            color:white  !important;
            transform:translateX(6px);
        }
        .sidebar a.active{
            background: linear-gradient(135deg, #7b7298, #8d86f1);
            color:white  !important;
            font-weight:600;
        }
        .overlay{
            position:fixed;
            top:0;
            left:0;
            width:0;
            height:100%;
            background:rgba(15,23,42,0.65);
            transition:0.3s;
            z-index:1500;
        }
        .overlay.show{ width:100%; }
        .main-content{
            padding:30px;
            display:flex;
            justify-content:center;
        }
        .center-wrapper{
            width:100%;
            max-width:1150px;
        }
        .page-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:25px;
            flex-wrap:wrap;
        }
        .page-header h1{
            font-size:32px;
            font-weight:800;
            color:#0f172a;
            margin:0;
        }
        .actions{
            display:flex;
            align-items:center;
            gap:12px;
        }
        .search-box{
            display:flex;
            align-items:center;
            gap:10px;
            background:white  !important;
            border:1px solid #e2e8f0;
            border-radius:10px;
            padding:10px 14px;
            width:260px;
            box-shadow:0 6px 18px rgba(0,0,0,0.06);
        }

        .search-box input{
            border:none;
            outline:none;
            width:100%;
        }
        .add-btn{
            background: linear-gradient(135deg, #7065fa, #2c13cd);
            color:white;
            padding:10px 16px;
            border-radius:10px;
            text-decoration:none;
            font-weight:600;
            box-shadow:0 8px 20px rgba(99,102,241,0.3);
            transition:0.2s;
        }
        .add-btn:hover{
            background: linear-gradient(135deg,#4f46e5,#2563eb);
            transform:translateY(-2px);
        }
        .table-container{
            background:white !important;
            border-radius:14px;
            padding:12px;
            box-shadow:0 12px 30px rgba(15,23,42,0.08);
        }
        .employee-table th{
            background: #1a1567;
            color:white;
            padding:14px;
        }
        .employee-table td{
            padding:14px;
            border-bottom:1px solid #f1f1f1;
        }
        .employee-table tr:hover{
            background:#eef2ff;
        }
        .btn-edit{
            background: #65ff5a !important;
            border:none !important;
        }
        .btn-edit:hover{
            background: #4ac83f !important;
        }
        .btn-delete{
            background: #fd4137 !important;
            border:none !important;
        }
        .btn-delete:hover{
            background: #e30d00 !important;
        }
        @media (max-width:768px){
            .page-header{
                flex-direction:column;
                align-items:flex-start;
                gap:15px;
            }
            .actions{
                width:100%;
                flex-direction:column;
            }
            .search-box{
                width:100%;
            }
        }
    </style>
</head>
<body>
<div class="menu" onclick="toggleSidebar()">
    <div></div>
    <div></div>
    <div></div>
</div>
<div id="sidebar" class="sidebar">
    <h2>Supermarket</h2>
    <a th:href="@{/}"><i class="fas fa-house"></i> Dashboard</a>
    <a th:href="@{/admin/employee_list}" class="active"><i class="fas fa-users"></i> Employees</a>
    <a th:href="@{/admin/sections}"><i class="fas fa-layer-group"></i> Sections</a>
    <a th:href="@{/admin/products}"><i class="fas fa-box"></i> Products</a>
    <a th:href="@{/admin/sales}"><i class="fas fa-chart-line"></i> Sales</a>
    <a th:href="@{/admin/stockRequests}"><i class="fas fa-truck"></i> Stock</a>
    <a th:href="@{/admin/logs}"><i class="fas fa-clipboard-list"></i> Logs</a>
    <a th:href="@{/admin/profile}"><i class="fas fa-user-cog"></i> Profile</a>
    <a th:href="@{/logout}"><i class="fas fa-right-from-bracket"></i> Logout</a>
</div>
<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>
<div class="main-content">
    <div class="center-wrapper">
        <div class="page-header">
            <h1>Employee Management</h1>
            <div class="actions">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search employees...">
                </div>
                <a th:href="@{/admin/addEmployee}" class="add-btn">+ Add Employee</a>
            </div>
        </div>
        <div class="table-container">
            <table class="table employee-table align-middle">
                <thead>
                <tr>
                    <th>Id</th>
                    <th>Username</th>
                    <th>FullName</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Join Date</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="employee : ${getAllEmployees}">
                    <td th:text="${employee.id}"></td>
                    <td th:text="${employee.username}"></td>
                    <td th:text="${employee.fullName}"></td>
                    <td th:text="${employee.email}"></td>
                    <td th:text="${employee.role != null ? employee.role.role : 'N/A'}"></td>
                    <td th:text="${employee.createdAt}"></td>
                    <td>
                        <a class="btn btn-edit btn-sm"
                           th:href="@{/admin/editEmployee/{id}(id=${employee.id})}">
                            Edit
                        </a>
                        <form th:action="@{/admin/deleteEmployee/{id}(id=${employee.id})}"
                              method="post"
                              style="display:inline;">
                            <button class="btn btn-delete btn-sm">
                                Delete
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function toggleSidebar(){
        document.getElementById("sidebar").classList.toggle("open");
        document.getElementById("overlay").classList.toggle("show");
    }
</script>

</body>
</html>
