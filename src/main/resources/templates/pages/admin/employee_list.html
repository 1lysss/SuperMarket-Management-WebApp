<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/css/employee_list.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="menu" onclick="toggleSidebar()">
    <div></div>
    <div></div>
    <div></div>
</div>
<div id="sidebar" class="sidebar">
    <h2>Supermarket</h2>
    <a th:href="@{/}"><i class="fas fa-house"></i> Dashboard</a>
    <a th:href="@{/admin/employee_list}" class="active"><i class="fas fa-users"></i> Employees</a>
    <a th:href="@{/admin/sections}"><i class="fas fa-layer-group"></i> Sections</a>
    <a th:href="@{/admin/products}"><i class="fas fa-box"></i> Products</a>
    <a th:href="@{/admin/sales}"><i class="fas fa-chart-line"></i> Sales</a>
    <a th:href="@{/admin/stockRequests}"><i class="fas fa-truck"></i> Stock</a>
    <a th:href="@{/admin/logs}"><i class="fas fa-clipboard-list"></i> Logs</a>
    <a th:href="@{/admin/profile}"><i class="fas fa-user-cog"></i> Profile</a>
    <a th:href="@{/logout}"><i class="fas fa-right-from-bracket"></i> Logout</a>
</div>
<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>
<div class="main-content">
    <div class="center-wrapper">
        <div class="page-header">
            <h1>Employee Management</h1>
            <div class="actions">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search employees...">
                </div>
                <a th:href="@{/admin/addEmployee}" class="add-btn">+ Add Employee</a>
            </div>
        </div>
        <div class="table-container">
            <table class="table employee-table align-middle">
                <thead>
                <tr>
                    <th>Id</th>
                    <th>Username</th>
                    <th>FullName</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Join Date</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="employee : ${getAllEmployees}">
                    <td th:text="${employee.id}"></td>
                    <td th:text="${employee.username}"></td>
                    <td th:text="${employee.fullName}"></td>
                    <td th:text="${employee.email}"></td>
                    <td th:text="${employee.role != null ? employee.role.role : 'N/A'}"></td>
                    <td th:text="${employee.createdAt}"></td>
                    <td>
                        <a class="btn btn-edit btn-sm"
                           th:href="@{/admin/editEmployee/{id}(id=${employee.id})}">
                            Edit
                        </a>
                        <form th:action="@{/admin/deleteEmployee/{id}(id=${employee.id})}"
                              method="post"
                              style="display:inline;">
                            <button class="btn btn-delete btn-sm">
                                Delete
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function toggleSidebar(){
        document.getElementById("sidebar").classList.toggle("open");
        document.getElementById("overlay").classList.toggle("show");
    }

    document.querySelectorAll('.employee-table tbody tr').forEach(row => {
        row.querySelectorAll('td').forEach(cell => {
            cell.dataset.original = cell.innerHTML;
        });
    });

    document.querySelector('.search-box input').addEventListener('input', function () {
        const query = this.value.trim();
        const rows = document.querySelectorAll('.employee-table tbody tr');

        rows.forEach(row => {
            const cells = row.querySelectorAll('td');

            cells.forEach(cell => {
                cell.innerHTML = cell.dataset.original;
            });

            if (!query) {
                row.style.display = '';
                return;
            }

            const rowText = row.textContent.toLowerCase();
            const matches = rowText.includes(query.toLowerCase());
            row.style.display = matches ? '' : 'none';

            if (matches) {
                cells.forEach(cell => {
                    if (cell.querySelector('a, button, form')) return;
                    const regex = new RegExp(`(${query})`, 'gi');
                    cell.innerHTML = cell.dataset.original.replace(regex, '<mark>$1</mark>');
                });
            }
        });
    });

</script>

</body>
</html>
