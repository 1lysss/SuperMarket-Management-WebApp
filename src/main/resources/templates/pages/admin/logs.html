<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Logs</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hamburger" onclick="toggleSidebar()">&#9776;</div>
<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<div id="mySidebar" class="sidebar">
    <h2>Supermarket</h2>
    <a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
    <a href="employee_list.html"><i class="fas fa-user-friends"></i> Employees</a>
    <a href="sections.html"><i class="fas fa-th"></i> Sections</a>
    <a href="products.html"><i class="fas fa-cube"></i> Products</a>
    <a href="sales.html"><i class="fas fa-shopping-cart"></i> Sales</a>
    <a href="stock_requests.html"><i class="fas fa-file-alt"></i> Stock Requests</a>
    <a href="logs.html" class="active"><i class="fas fa-wave-square"></i> Logs</a>
    <a href="admin_user.html"><i class="fas fa-user-cog"></i> Admin User</a>
    <a href="logout.html"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<div class="top-bar">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search logs..." id="logSearch">
    </div>
    <button class="notification-btn" id="notifButton">
        <i class="fas fa-bell"></i>
        <span class="badge" id="notifCount">0</span>
    </button>
</div>

<div id="notifDropdown"><ul id="notifList"></ul></div>

<div class="main-content">
    <h1>Activity Logs</h1>

    <table class="table logs-table" id="logsTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Time</th>
                <th>User</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="logsTableBody"></tbody>
    </table>
</div>

<script>
function toggleSidebar(){
    const sidebar=document.getElementById("mySidebar");
    const overlay=document.getElementById("overlay");
    sidebar.classList.toggle("open");
    overlay.classList.toggle("show");
}

const sidebarLinks=document.querySelectorAll(".sidebar a");
const currentPage=window.location.pathname.split("/").pop();
sidebarLinks.forEach(link=>{
    if(link.getAttribute("href").split("/").pop()===currentPage){
        sidebarLinks.forEach(l=>l.classList.remove("active"));
        link.classList.add("active");
    }
});

const notifButton=document.getElementById("notifButton");
const notifDropdown=document.getElementById("notifDropdown");
notifButton.addEventListener("click",()=>{
  notifDropdown.style.display=notifDropdown.style.display==="none"?"block":"none";
});

// Logs logic
let logsDB = [];
function addLog(user, action){
    const timestamp = new Date().toLocaleString();
    const id = logsDB.length === 0 ? 1 : Math.max(...logsDB.map(l=>l.id))+1;
    logsDB.push({id, time: timestamp, user, action});
    renderLogs();
    updateCards();
}

function renderLogs(filtered=null){
    const tbody=document.getElementById("logsTableBody");
    tbody.innerHTML="";
    const list=filtered||logsDB;
    list.forEach(log=>{
        const row=document.createElement("tr");
        row.innerHTML=`
            <td>${log.id}</td>
            <td>${log.time}</td>
            <td>${log.user}</td>
            <td>${log.action}</td>
        `;
        tbody.appendChild(row);
    });
}

document.getElementById("logSearch").addEventListener("input",function(){
    const query=this.value.toLowerCase();
    const filtered=logsDB.filter(log=>{
        return log.user.toLowerCase().includes(query) ||
               log.action.toLowerCase().includes(query);
    });
    renderLogs(filtered);
});

function updateCards(){
    document.getElementById("totalActivity").innerText = logsDB.length;
    const activeUsers = [...new Set(logsDB.map(l=>l.user))].length;
    document.getElementById("activeUsers").innerText = activeUsers;
}

renderLogs();
</script>

</body>
</html>
