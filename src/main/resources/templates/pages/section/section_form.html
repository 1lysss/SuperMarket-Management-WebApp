<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${section.id != null} ? 'Edit Section' : 'Add Section'">Section Form</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deep: "#09637E",
                        primary: "#088395",
                        mid: "#7AB2B2",
                        light: "#EBF4F6",
                        border: "#c4dde3",
                        tx: "#0f2e38",
                        muted: "#4a7a86",
                    },
                    fontFamily: {
                        title: ["'Space Grotesk'", "sans-serif"],
                        body: ["'DM Sans'", "sans-serif"],
                    },
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/css/sidebar.css">
</head>

<body class="flex min-h-screen bg-light font-body text-tx">
<aside class="sidebar">
    <div class="sidebar-brand">🛒 Supermarket</div>
    <a th:href="@{/}"> <i class="fas fa-house"></i> Dashboard </a>
    <a th:href="@{/admin/employee_list}"> <i class="fas fa-users"></i> Employees </a>
    <a th:href="@{/sections/}" class="active"> <i class="fas fa-layer-group"></i> Sections </a>
    <a th:href="@{/products/}"> <i class="fas fa-box"></i> Products </a>
    <a th:href="@{/admin/sales}"> <i class="fas fa-chart-line"></i> Sales </a>
    <a th:href="@{/admin/stockRequests}"> <i class="fas fa-truck"></i> Stock </a>
    <a th:href="@{/admin/logs}"> <i class="fas fa-clipboard-list"></i> Logs </a>
    <a th:href="@{/admin/profile}"> <i class="fas fa-user-cog"></i> Profile </a>
    <a th:href="@{/logout}"> <i class="fas fa-right-from-bracket"></i> Logout </a>
</aside>
<div class="flex-1 p-9">
    <!-- Breadcrumb -->
    <div class="flex items-center gap-2 mb-7">
        <a th:href="@{/sections/}"
           class="text-sm text-muted hover:text-deep transition-colors duration-150 no-underline">
            <i class="fas fa-arrow-left mr-1"></i> Section
        </a>
        <span class="text-border text-sm">/</span>
        <h1 class="font-title font-bold text-2xl text-deep m-0"
            th:text="${section.id != null} ? 'Edit Section' : 'Add Section'">
            Add Section
        </h1>
    </div>
    <div class="bg-white border border-border rounded-xl p-8 max-w-xl">
        <form th:action="${section.id != null} ? @{/sections/edit/{id}(id=${section.id})} : @{/sections/add}"
              th:object="${section}" method="post" enctype="multipart/form-data">
            <div class="mb-4">
                <label class="block text-sm font-medium text-deep mb-1">Section Name</label>
                <input type="text" th:field="*{name}" placeholder="e.g. Fruits & Vegetables"
                       class="w-full text-sm border border-border rounded-lg px-3 py-2 outline-none
                      focus:border-primary focus:ring-2 focus:ring-primary/10" required />
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-deep mb-1">Description</label>
                <input type="text" th:field="*{description}" placeholder="Short description"
                       class="w-full text-sm border border-border rounded-lg px-3 py-2 outline-none
                      focus:border-primary focus:ring-2 focus:ring-primary/10" />
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-deep mb-1">Image</label>
                <input type="file" name="imageFile"
                       class="w-full text-sm border border-border rounded-lg px-3 py-2 bg-white" />
            </div>
            <div class="flex items-center gap-3">
                <button type="submit"
                        class="text-sm font-medium bg-primary hover:bg-deep text-white px-5 py-2 rounded-lg transition">
                    Save Section
                </button>
                <a th:href="@{/sections/}"
                   class="text-sm text-muted border border-border rounded-lg px-4 py-2 hover:border-mid hover:text-deep transition">
                    Cancel
                </a>
            </div>

        </form>

    </div>
</div>

</body>
</html>
